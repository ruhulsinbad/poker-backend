version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: poker_db
    environment:
      POSTGRES_DB: pokerapp
      POSTGRES_USER: poker
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poker -d pokerapp"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: poker_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API + Game Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: poker_backend
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://poker:${DB_PASSWORD:-changeme}@postgres:5432/pokerapp
      REDIS_URL: redis://redis:6379
      BOT_TOKEN: ${BOT_TOKEN}
      BOT_USERNAME: ${BOT_USERNAME}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_TELEGRAM_ID: ${ADMIN_TELEGRAM_ID}
      FRONTEND_URL: ${FRONTEND_URL}
      TON_ENDPOINT: https://toncenter.com/api/v2/jsonRPC
      TON_API_KEY: ${TON_API_KEY}
      NFT_COLLECTION_ADDRESS: ${NFT_COLLECTION_ADDRESS}
      ROYALTY_WALLET: ${ROYALTY_WALLET}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - /app/node_modules

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: poker_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
